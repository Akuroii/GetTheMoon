<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get The Moon · 100K</title>
<meta name="description" content="Get The Moon — chasing 100,000 subscribers, one orbit at a time.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  /* ============================================================
     CONFIG — this is the ONLY section you need to touch to update
     the numbers, links, and text. Everything below is styling/logic.
     ============================================================ */

  :root{
    --bg: #04040a;
    --surface: #0d0d1f;
    --surface-2: #14142b;
    --text: #f0eefc;
    --text-dim: #9d98c2;
    --gold: #f5c453;      /* moonlight */
    --violet: #7c6fee;    /* orbit / meteors */
    --pink: #ff5ea8;      /* black hole rim */
    --line: rgba(240,238,252,0.10);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Spectral', serif;
    overflow-x: hidden;
    cursor: default;
  }
  body.rem-cursor, body.rem-cursor *{
    /* Drop a 32x32-ish transparent PNG named rem-cursor.png next to this file,
       uncomment the line below, and the whole site will use it as the cursor. */
    /* cursor: url('rem-cursor.png') 8 8, auto !important; */
  }

  a{color:inherit; text-decoration:none;}

  ::selection{ background: var(--violet); color: #fff; }

  /* ---------- starfield / meteor background ---------- */
  #sky{
    position: fixed; inset:0; z-index:0; pointer-events:none;
  }

  /* ---------- layout shell ---------- */
  .wrap{
    position: relative; z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 0 24px 120px;
  }

  header.top{
    display:flex; align-items:center; justify-content:space-between;
    padding: 28px 0 8px;
    font-family:'Space Grotesk', sans-serif;
  }
  .brand{
    font-weight:700; font-size:15px; letter-spacing:0.14em;
    text-transform: uppercase; color: var(--text);
  }
  .brand span{ color: var(--gold); }
  .rem-toggle{
    width:10px; height:10px; border-radius:50%;
    background: transparent; border: 1px solid var(--line);
    cursor: pointer;
  }
  .rem-toggle:hover{ background: var(--pink); border-color: var(--pink); }

  /* ---------- hero ---------- */
  .hero{
    text-align:center;
    padding: 60px 0 20px;
  }
  .eyebrow{
    font-family:'Space Grotesk', sans-serif;
    font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 18px;
  }
  h1{
    font-family:'Spectral', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(28px, 5vw, 46px);
    line-height: 1.15;
    margin: 0 0 8px;
  }
  h1 em{ color: var(--gold); font-style: normal; font-weight:600; }

  .sub-line{
    color: var(--text-dim);
    font-size: 16px;
    margin-bottom: 50px;
  }

  /* ---------- the moon / counter (signature element) ---------- */
  .moon-stage{
    position: relative;
    width: 320px; height: 320px;
    margin: 0 auto 36px;
  }
  .orbit-ring{
    position:absolute; inset: -34px;
    border: 1px dashed var(--line);
    border-radius: 50%;
    animation: spin 40s linear infinite;
  }
  .orbit-ring .dot{
    position:absolute; width:6px; height:6px; border-radius:50%;
    background: var(--violet);
    top:50%; left:-3px;
    box-shadow: 0 0 8px var(--violet);
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .moon{
    position:absolute; inset: 24px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #2a2a44, #0a0a16 70%);
    box-shadow:
      inset -20px -20px 60px rgba(0,0,0,0.6),
      0 0 0 1px var(--line);
    overflow: hidden;
  }
  /* the "fill" — glows brighter / rises as progress % increases, via --fill var (0 to 1) set in JS */
  .moon-fill{
    position:absolute; left:0; right:0; bottom:0;
    height: calc(var(--fill, 0.42) * 100%);
    background: linear-gradient(180deg, var(--gold), #d99a2b 60%, #7a5a17);
    filter: blur(0.5px);
    transition: height 1.4s cubic-bezier(.2,.8,.2,1);
    opacity: 0.9;
  }
  .moon-craters{ position:absolute; inset:0; mix-blend-mode: multiply; opacity:0.35; }
  .moon-glow{
    position:absolute; inset: -40px; border-radius:50%;
    background: radial-gradient(circle, rgba(245,196,83,0.25), transparent 65%);
    filter: blur(8px);
    opacity: calc(var(--fill, 0.42) * 1.1);
    pointer-events:none;
  }

  .count-wrap{
    text-align:center;
  }
  .count{
    font-family:'IBM Plex Mono', monospace;
    font-size: clamp(38px, 7vw, 58px);
    font-weight:500;
    letter-spacing: 0.01em;
    color: var(--text);
  }
  .count-label{
    font-family:'Space Grotesk', sans-serif;
    font-size:12px; letter-spacing:0.2em; text-transform:uppercase;
    color: var(--text-dim); margin-top: 4px;
  }
  .progress-line{
    font-family:'Space Grotesk', sans-serif;
    font-size: 13px; color: var(--text-dim);
    margin-top: 14px;
  }
  .progress-line b{ color: var(--gold); font-weight:600; }

  /* ---------- stats row ---------- */
  .stats{
    display:flex; justify-content:center; gap: 48px;
    margin-top: 44px; flex-wrap: wrap;
  }
  .stat{ text-align:center; }
  .stat .num{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600; font-size: 22px;
  }
  .stat .lbl{
    font-family:'Space Grotesk', sans-serif;
    font-size: 11px; letter-spacing:0.16em; text-transform:uppercase;
    color: var(--text-dim); margin-top:2px;
  }

  /* ---------- platforms ---------- */
  .platforms{
    display:flex; justify-content:center; flex-wrap:wrap; gap:12px;
    margin-top: 60px;
  }
  .pill{
    font-family:'Space Grotesk', sans-serif;
    font-size: 13px; font-weight:500;
    padding: 10px 18px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--surface);
    display:flex; align-items:center; gap:8px;
    transition: border-color .2s, transform .2s;
  }
  .pill:hover{ border-color: var(--violet); transform: translateY(-2px); }
  .pill .dotc{ width:6px; height:6px; border-radius:50%; }

  /* ---------- section heading ---------- */
  .section-head{
    font-family:'Space Grotesk', sans-serif;
    font-size: 12px; letter-spacing:0.2em; text-transform:uppercase;
    color: var(--text-dim);
    margin: 90px 0 18px;
    display:flex; align-items:center; gap:12px;
  }
  .section-head::after{
    content:''; flex:1; height:1px; background: var(--line);
  }

  /* ---------- video carousel ---------- */
  .carousel{
    display:flex; gap:16px; overflow-x:auto; padding-bottom: 12px;
    scroll-snap-type: x mandatory;
  }
  .carousel::-webkit-scrollbar{ height:6px; }
  .carousel::-webkit-scrollbar-thumb{ background: var(--line); border-radius:3px; }
  .vcard{
    scroll-snap-align:start;
    flex: 0 0 240px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow:hidden;
    cursor:pointer;
    transition: transform .2s, border-color .2s;
  }
  .vcard:hover{ transform: translateY(-4px); border-color: var(--violet); }
  .vcard .thumb{
    aspect-ratio: 16/9;
    background: var(--surface-2);
    display:flex; align-items:center; justify-content:center;
    font-size: 22px; color: var(--text-dim);
    background-size: cover; background-position:center;
  }
  .vcard .info{ padding: 12px 14px; }
  .vcard .title{
    font-family:'Space Grotesk', sans-serif;
    font-size: 13px; font-weight:500;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .vcard .meta{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--text-dim); margin-top:6px;
  }

  /* ---------- footer ---------- */
  footer{
    text-align:center; margin-top: 100px;
    font-family:'Space Grotesk', sans-serif;
    font-size: 12px; color: var(--text-dim);
  }

  /* ---------- black hole celebration overlay ---------- */
  #celebrate{
    position: fixed; inset:0; z-index: 50;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at center, #000 0%, #000 30%, rgba(0,0,0,0.95) 60%);
    opacity:0; pointer-events:none;
    transition: opacity 1.2s ease;
  }
  #celebrate.show{ opacity:1; pointer-events:all; }
  .horizon{
    width: 120px; height:120px; border-radius:50%;
    background: #000;
    box-shadow: 0 0 60px 20px var(--pink), 0 0 120px 60px rgba(255,94,168,0.4);
    animation: pulseHorizon 2s ease-in-out infinite;
  }
  @keyframes pulseHorizon{ 50%{ box-shadow: 0 0 90px 30px var(--pink), 0 0 160px 80px rgba(255,94,168,0.5);} }
  #celebrate .msg{
    position:absolute; text-align:center; font-family:'Spectral', serif; font-style:italic;
    font-size: clamp(22px,4vw,34px); color: var(--gold);
  }

  @media (prefers-reduced-motion: reduce){
    .orbit-ring, .horizon{ animation: none; }
    .moon-fill{ transition: none; }
  }

  @media (max-width: 560px){
    .moon-stage{ width: 240px; height:240px; }
    .stats{ gap: 28px; }
  }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<div class="wrap">

  <header class="top">
    <div class="brand">get<span>the</span>moon</div>
    <div class="rem-toggle" id="remToggle" title="???"></div>
  </header>

  <section class="hero">
    <div class="eyebrow">100,000 subscriber watch</div>
    <h1>Every orbit brings us <em>closer</em><br>to the Moon.</h1>
    <div class="sub-line">A little gift, watching the count climb together.</div>

    <div class="moon-stage">
      <div class="orbit-ring">
        <div class="dot" style="top:50%; left:-3px;"></div>
        <div class="dot" style="top:-3px; left:50%;"></div>
        <div class="dot" style="bottom:-3px; left:50%;"></div>
      </div>
      <div class="moon-glow"></div>
      <div class="moon">
        <div class="moon-fill"></div>
      </div>
    </div>

    <div class="count-wrap">
      <div class="count" id="countNum">0</div>
      <div class="count-label">Subscribers</div>
      <div class="progress-line" id="progressLine"></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="num" id="statViews">—</div><div class="lbl">Total Views</div></div>
      <div class="stat"><div class="num" id="statVideos">—</div><div class="lbl">Videos</div></div>
      <div class="stat"><div class="num" id="statNext">100K</div><div class="lbl">Next Milestone</div></div>
    </div>

    <div class="platforms" id="platformRow"></div>
  </section>

  <div class="section-head">Recent uploads</div>
  <div class="carousel" id="carousel"></div>

  <footer>made with orbits and a little stardust · getthemoon</footer>
</div>

<div id="celebrate">
  <div class="horizon"></div>
  <div class="msg">100,000. We got the Moon.</div>
</div>

<script>
/* ============================================================
   CONFIG — EDIT THIS BLOCK to update everything on the site.
   No other code needs to change for basic updates.
   ============================================================ */
const CONFIG = {
  currentSubs: 42300,      // <-- update this number by hand as it grows
  goal: 100000,
  totalViews: "1.8M",
  videoCount: 214,

  platforms: [
    { label: "Main Channel", color: "#ff5ea8", url: "https://www.youtube.com/@YOUR_MAIN_HANDLE" },
    { label: "EN Channel",   color: "#7c6fee", url: "https://www.youtube.com/@YOUR_EN_HANDLE" },
    { label: "TikTok",       color: "#f5c453", url: "https://www.tiktok.com/@YOUR_HANDLE" },
    { label: "Facebook",     color: "#7c6fee", url: "https://www.facebook.com/YOUR_PAGE" },
    { label: "Discord",      color: "#ff5ea8", url: "https://discord.gg/YOUR_INVITE" },
  ],

  // Add real recent videos here: title, youtube video ID, and thumbnail (auto-generated from ID).
  videos: [
    { title: "Sample video title one", id: "dQw4w9WgXcQ", views: "12K views" },
    { title: "Sample video title two", id: "dQw4w9WgXcQ", views: "8.4K views" },
    { title: "Sample video title three", id: "dQw4w9WgXcQ", views: "20K views" },
    { title: "Sample video title four", id: "dQw4w9WgXcQ", views: "5K views" },
  ]
};

/* ============================================================
   Rendering — reads CONFIG above, no need to edit below this line
   ============================================================ */
const fillPct = Math.min(CONFIG.currentSubs / CONFIG.goal, 1);
document.querySelector('.moon').style.setProperty('--fill', fillPct.toFixed(3));

// animated count-up
(function animateCount(){
  const el = document.getElementById('countNum');
  const target = CONFIG.currentSubs;
  const dur = 1800;
  const start = performance.now();
  function tick(now){
    const p = Math.min((now - start) / dur, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.floor(eased * target).toLocaleString();
    if(p < 1) requestAnimationFrame(tick);
    else el.textContent = target.toLocaleString();
  }
  requestAnimationFrame(tick);
})();

document.getElementById('progressLine').innerHTML =
  `<b>${(fillPct*100).toFixed(1)}%</b> of the way to ${CONFIG.goal.toLocaleString()}`;
document.getElementById('statViews').textContent = CONFIG.totalViews;
document.getElementById('statVideos').textContent = CONFIG.videoCount;

// platform pills
const platformRow = document.getElementById('platformRow');
CONFIG.platforms.forEach(p => {
  const a = document.createElement('a');
  a.className = 'pill'; a.href = p.url; a.target = '_blank'; a.rel = 'noopener';
  a.innerHTML = `<span class="dotc" style="background:${p.color}"></span>${p.label}`;
  platformRow.appendChild(a);
});

// video carousel — click opens the real video
const carousel = document.getElementById('carousel');
CONFIG.videos.forEach(v => {
  const card = document.createElement('div');
  card.className = 'vcard';
  card.onclick = () => window.open(`https://www.youtube.com/watch?v=${v.id}`, '_blank');
  card.innerHTML = `
    <div class="thumb" style="background-image:url('https://img.youtube.com/vi/${v.id}/mqdefault.jpg')"></div>
    <div class="info">
      <div class="title">${v.title}</div>
      <div class="meta">${v.views}</div>
    </div>`;
  carousel.appendChild(card);
});

// celebrate at goal
if (CONFIG.currentSubs >= CONFIG.goal){
  setTimeout(() => document.getElementById('celebrate').classList.add('show'), 2200);
  document.getElementById('celebrate').addEventListener('click', function(){ this.classList.remove('show'); });
}

// Rem cursor easter egg — click the small dot top-right 3 times
let remClicks = 0;
document.getElementById('remToggle').addEventListener('click', () => {
  remClicks++;
  if (remClicks >= 3){
    document.body.classList.toggle('rem-cursor');
    remClicks = 0;
  }
});

/* ---------- starfield + meteor canvas background ---------- */
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let w, h, stars, meteors;

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function makeStars(n){
  return Array.from({length:n}, () => ({
    x: Math.random()*w, y: Math.random()*h,
    r: Math.random()*1.3 + 0.2,
    a: Math.random()*0.6 + 0.2,
    tw: Math.random()*0.02 + 0.005
  }));
}
function makeMeteor(){
  const startX = Math.random()*w*1.4 - w*0.2;
  return {
    x: startX, y: -20,
    len: Math.random()*80 + 60,
    speed: Math.random()*6 + 4,
    angle: Math.PI/4 + (Math.random()*0.15 - 0.075),
    life: 1
  };
}
stars = makeStars(140);
meteors = [ makeMeteor() ];

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function draw(){
  ctx.clearRect(0,0,w,h);
  // stars
  stars.forEach(s => {
    s.a += reduceMotion ? 0 : (Math.sin(Date.now()*s.tw) * 0.002);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(240,238,252,${Math.max(0.15, Math.min(0.9,s.a))})`;
    ctx.fill();
  });

  if (!reduceMotion){
    // meteors
    meteors.forEach(m => {
      m.x += Math.cos(m.angle)*m.speed;
      m.y += Math.sin(m.angle)*m.speed;
      const tailX = m.x - Math.cos(m.angle)*m.len;
      const tailY = m.y - Math.sin(m.angle)*m.len;
      const grad = ctx.createLinearGradient(m.x,m.y,tailX,tailY);
      grad.addColorStop(0, 'rgba(255,255,255,0.9)');
      grad.addColorStop(1, 'rgba(124,111,238,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(m.x,m.y);
      ctx.lineTo(tailX,tailY);
      ctx.stroke();
    });
    meteors = meteors.filter(m => m.y < h + 100 && m.x < w + 200);
    if (Math.random() < 0.02) meteors.push(makeMeteor());
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
